<html lang="hu">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JackpotHD - Logo Variációk</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;700;900&family=Rajdhani:wght@600;700&family=Alfa+Slab+One&family=Space+Grotesk:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;padding:40px 20px}
h1{text-align:center;font-size:2rem;font-weight:300;letter-spacing:.1em;margin-bottom:8px;color:#888}
.subtitle{text-align:center;color:#555;font-size:.9rem;margin-bottom:50px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:30px;max-width:1100px;margin:0 auto}
.card{border-radius:16px;overflow:hidden;position:relative;transition:transform .3s}
.card:hover{transform:translateY(-4px)}
.card-header{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:14px 18px;z-index:2}
.card-number{font-size:.75rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;opacity:.6}
.card-style-name{font-size:.7rem;font-weight:400;letter-spacing:.1em;text-transform:uppercase;opacity:.5}
.logo-area{display:flex;align-items:center;justify-content:center;padding:50px 40px;cursor:pointer}
.logo-area svg{width:220px;height:220px;border-radius:24px}
.card-footer{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,.06)}
.palette{display:flex;gap:6px}
.palette-color{width:22px;height:22px;border-radius:6px;border:1px solid rgba(255,255,255,.1);cursor:pointer;position:relative;transition:transform .2s}
.palette-color:hover{transform:scale(1.2)}
.palette-color::after{content:attr(data-hex);position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:.55rem;color:#666;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
.palette-color:hover::after{opacity:1}
.download-btn,.back-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#aaa;padding:8px 14px;border-radius:8px;font-size:.75rem;cursor:pointer;transition:all .2s;font-family:inherit;letter-spacing:.05em}
.download-btn:hover,.back-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.back-btn{margin-bottom:30px;font-size:.85rem;padding:10px 20px}
.card-1{background:#0d0d18;border:1px solid rgba(255,0,200,.15)}.card-1 .card-number,.card-1 .card-style-name{color:#ff66cc}
.card-2{background:#0c0a08;border:1px solid rgba(212,175,55,.2)}.card-2 .card-number,.card-2 .card-style-name{color:#d4af37}
.card-3{background:#0a0a1a;border:1px solid rgba(0,150,255,.15)}.card-3 .card-number,.card-3 .card-style-name{color:#0096ff}
.card-4{background:#0e0b1a;border:1px solid rgba(139,92,246,.2)}.card-4 .card-number,.card-4 .card-style-name{color:#a78bfa}
.card-5{background:#1a0a0a;border:1px solid rgba(200,50,50,.15)}.card-5 .card-number,.card-5 .card-style-name{color:#cc6644}
.card-6{background:#060d12;border:1px solid rgba(0,210,150,.12)}.card-6 .card-number,.card-6 .card-style-name{color:#00d296}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(255,255,255,.12);backdrop-filter:blur(20px);color:#fff;padding:12px 24px;border-radius:10px;font-size:.85rem;transition:transform .4s;z-index:100;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
#detail-view{display:none}
.detail-header{max-width:1100px;margin:0 auto 30px}
.detail-title{font-size:1.4rem;font-weight:300;letter-spacing:.08em;color:#888;margin-top:10px}
</style>

function buildSVG(styleIdx, varIdx) {
  const s = STYLES[styleIdx];
  const p = `s${styleIdx}v${varIdx}_`;
  const bgFill = s.bg || `url(#${p}bg)`;
  const body = s.variants[varIdx](p);
  return `<svg id="logo-${styleIdx+1}-${varIdx+1}" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<defs>${s.defs(p)}</defs>
<rect width="400" height="400" rx="40" fill="${bgFill}"/>
${body}
</svg>`;
}

function paletteHTML(colors) {
  return `<div class="palette">${colors.map(c=>`<div class="palette-color" style="background:${c}" data-hex="${c}"></div>`).join('')}</div>`;
}

function renderMain() {
  const grid = document.getElementById('main-grid');
  grid.innerHTML = STYLES.map((s,i)=>`
<div class="card ${s.cls}">
  <div class="card-header"><span class="card-number">#${i+1}</span><span class="card-style-name">${s.name}</span></div>
  <div class="logo-area" onclick="showDetail(${i})">${buildSVG(i,0)}</div>
  <div class="card-footer">${paletteHTML(s.palette)}<button class="download-btn" onclick="event.stopPropagation();downloadSVG('logo-${i+1}-1','jackpothd-${s.name.toLowerCase().replace(/[\s\/]+/g,'-')}-v1')">Letöltés SVG</button></div>
</div>`).join('');
  bindPalette();
}

function showDetail(styleIdx) {
  const s = STYLES[styleIdx];
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  document.getElementById('detail-title').textContent = `#${styleIdx+1} ${s.name} — 6 variáció`;
  const grid = document.getElementById('detail-grid');
  const slug = s.name.toLowerCase().replace(/[\s\/]+/g,'-');
  grid.innerHTML = s.variants.map((_,vi)=>`
<div class="card ${s.cls}">
  <div class="card-header"><span class="card-number">#${styleIdx+1}.${vi+1}</span><span class="card-style-name">${vi===0?'Eredeti':'Variáció '+(vi+1)}</span></div>
  <div class="logo-area">${buildSVG(styleIdx,vi)}</div>
  <div class="card-footer">${paletteHTML(s.palette)}<button class="download-btn" onclick="downloadSVG('logo-${styleIdx+1}-${vi+1}','jackpothd-${slug}-v${vi+1}')">Letöltés SVG</button></div>
</div>`).join('');
  bindPalette();
  window.scrollTo(0,0);
}

function showMain() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('main-view').style.display = 'block';
  window.scrollTo(0,0);
}

function downloadSVG(id, filename) {
  const svg = document.getElementById(id);
  if(!svg) return;
  const clone = svg.cloneNode(true);
  clone.removeAttribute('id');
  clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
  const s = new XMLSerializer();
  let str = '<?xml version="1.0" encoding="UTF-8"?>\n' + s.serializeToString(clone);
  const blob = new Blob([str],{type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=filename+'.svg';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('SVG letöltve: '+filename+'.svg');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function bindPalette() {
  document.querySelectorAll('.palette-color').forEach(el=>{
    el.onclick = e => {
      e.stopPropagation();
      navigator.clipboard.writeText(el.dataset.hex).then(()=>showToast('Szín másolva: '+el.dataset.hex));
    };
  });
}

renderMain();
</script>
