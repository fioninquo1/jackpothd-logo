<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JackpotHD - Logo Variációk</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;700;900&family=Rajdhani:wght@600;700&family=Alfa+Slab+One&family=Space+Grotesk:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #fff;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
  }

  h1 {
    text-align: center;
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    color: #888;
  }

  .subtitle {
    text-align: center;
    color: #555;
    font-size: 0.9rem;
    margin-bottom: 50px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
    gap: 30px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .card {
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    transition: transform 0.3s ease;
  }

  .card:hover {
    transform: translateY(-4px);
  }

  .card-number {
    position: absolute;
    top: 16px;
    left: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    z-index: 2;
    opacity: 0.6;
  }

  .card-style-name {
    position: absolute;
    top: 16px;
    right: 20px;
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    z-index: 2;
    opacity: 0.5;
  }

  .logo-area {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 220px;
    padding: 50px 30px;
  }

  .logo-area svg {
    max-width: 380px;
    width: 100%;
    height: auto;
  }

  .card-footer {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .palette {
    display: flex;
    gap: 6px;
  }

  .palette-color {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    position: relative;
    transition: transform 0.2s;
  }

  .palette-color:hover {
    transform: scale(1.2);
  }

  .palette-color::after {
    content: attr(data-hex);
    position: absolute;
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.55rem;
    color: #666;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }

  .palette-color:hover::after {
    opacity: 1;
  }

  .download-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #aaa;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    letter-spacing: 0.05em;
  }

  .download-btn:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }

  /* Card themes */
  .card-1 { background: #0d0d18; border: 1px solid rgba(255,0,200,0.15); }
  .card-1 .card-number, .card-1 .card-style-name { color: #ff66cc; }

  .card-2 { background: #0c0a08; border: 1px solid rgba(212,175,55,0.2); }
  .card-2 .card-number, .card-2 .card-style-name { color: #d4af37; }

  .card-3 { background: #f5f5f5; border: 1px solid #e0e0e0; }
  .card-3 .card-number, .card-3 .card-style-name { color: #333; }
  .card-3 .card-footer { border-top-color: rgba(0,0,0,0.08); }
  .card-3 .download-btn { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); color: #666; }
  .card-3 .download-btn:hover { background: rgba(0,0,0,0.1); color: #333; }
  .card-3 .palette-color { border-color: rgba(0,0,0,0.1); }

  .card-4 { background: #0e0b1a; border: 1px solid rgba(139,92,246,0.2); }
  .card-4 .card-number, .card-4 .card-style-name { color: #a78bfa; }

  .card-5 { background: #1a0a0a; border: 1px solid rgba(200,50,50,0.15); }
  .card-5 .card-number, .card-5 .card-style-name { color: #cc6644; }

  .card-6 { background: #060d12; border: 1px solid rgba(0,210,150,0.12); }
  .card-6 .card-number, .card-6 .card-style-name { color: #00d296; }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    color: #fff;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 0.85rem;
    transition: transform 0.4s ease;
    z-index: 100;
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>

<script>
function downloadSVG(id, filename) {
  const svg = document.getElementById(id);
  const clone = svg.cloneNode(true);

  // Remove filter references that might not render standalone
  clone.removeAttribute('id');

  // Collect all referenced defs from the parent SVG
  const defs = svg.querySelector('defs');
  if (defs) {
    const clonedDefs = defs.cloneNode(true);
    clone.insertBefore(clonedDefs, clone.firstChild);
  }

  // Add xmlns
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

  // Serialize
  const serializer = new XMLSerializer();
  let svgString = serializer.serializeToString(clone);

  // Add XML declaration
  svgString = '<?xml version="1.0" encoding="UTF-8"?>\n' + svgString;

  // Download
  const blob = new Blob([svgString], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename + '.svg';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  // Toast
  showToast('SVG letöltve: ' + filename + '.svg');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// Copy hex on palette click
document.querySelectorAll('.palette-color').forEach(el => {
  el.addEventListener('click', () => {
    const hex = el.getAttribute('data-hex');
    navigator.clipboard.writeText(hex).then(() => {
      showToast('Szín másolva: ' + hex);
    });
  });
});
</script>
